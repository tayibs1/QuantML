# One command brings up the whole stack:  docker compose up --build
#   - FastAPI backend on http://localhost:8000  (docs at /docs, metrics at /metrics)
#   - Next.js dashboard on http://localhost:3000
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: quantml-api
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: quantml-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Optional: run the pipeline on a daily cadence (dry-run plan by default — a real
  # run needs the data feed + Alpaca secrets). Enable with:
  #   docker compose --profile scheduler up
  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: quantml-scheduler
    profiles: ["scheduler"]
    working_dir: /app
    command: sh -c "while true; do python -m ml.pipeline --dry-run; sleep 86400; done"
