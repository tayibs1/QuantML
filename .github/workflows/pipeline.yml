name: Pipeline

# Scheduled production cadence for the ML pipeline. The daily path is the cheap
# one (features → validate → score → drift); the full weekly retrain adds ingest
# and train. A real run needs the market-data feed and, for paper trading, the
# Alpaca secrets — so on a secretless fork this verifies the orchestration wiring
# (a dry-run plan) and can be promoted to a live run once secrets are configured.

on:
  schedule:
    - cron: "30 22 * * 1-5"   # 22:30 UTC, weekdays — after the US market close
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (plan only) or live (real run, needs data + secrets)"
        type: choice
        default: dry-run
        options: [dry-run, live]

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  score:
    name: Daily score + drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt

      # Default (schedule / dry-run): prove the stage graph and gate are wired.
      - name: Plan pipeline (dry-run)
        if: ${{ github.event.inputs.mode != 'live' }}
        run: python -m ml.pipeline --start features --dry-run

      # Live run: only when explicitly dispatched and secrets/data are present.
      - name: Run daily pipeline (live)
        if: ${{ github.event.inputs.mode == 'live' }}
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: python -m ml.pipeline --only features,validate,score,drift
