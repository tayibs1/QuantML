# Run the whole stack with one command:  docker compose up
# (Dockerfiles are added when we containerize — see docs/BACKEND.md go-live checklist.)
services:
  backend:
    build: ./backend
    container_name: quantml-api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - ./data:/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: quantml-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

