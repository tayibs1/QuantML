name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run if the same ref gets pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Python · lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            ml/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r ml/requirements.txt -r requirements-dev.txt

      # Tests run with no data/ artifacts (they're gitignored), exercising the
      # same graceful mock fallback the API uses on a cold checkout.
      - name: Lint (ruff)
        run: ruff check ml backend tests

      - name: Tests (pytest)
        run: pytest

  frontend:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # next build runs the TypeScript and ESLint checks as part of the build,
      # so a green build is also a green typecheck/lint.
      - name: Build
        run: npm run build
